[Unit]
Description=Postman -> WakaTime collector
After=graphical-session.target network.target
PartOf=graphical-session.target

[Service]
Type=simple
ExecStart=%h/.local/bin/postman-wakatime
Restart=on-failure
RestartSec=3
EnvironmentFile=%h/.config/postman-wakatime.env
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=graphical-session.target